name: Nebula
options:
  bundleIdPrefix: com.nebula.ai
targets:
  Nebula:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: ios-native
    settings:
      base:
        INFOPLIST_FILE: ios-native/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.nebula.ai
        MARKETING_VERSION: 1.0.0
        CURRENT_PROJECT_VERSION: 1
        DEVELOPMENT_TEAM: "" # Empty for unsigned
